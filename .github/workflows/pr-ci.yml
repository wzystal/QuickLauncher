name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Load CI config
        run: |
          set -a
          source ci/release.env
          set +a
          echo "GRADLE_DEBUG_TASK=${GRADLE_DEBUG_TASK}" >> "$GITHUB_ENV"

      - name: Compile Debug APK
        run: chmod +x gradlew && ./gradlew "$GRADLE_DEBUG_TASK"
